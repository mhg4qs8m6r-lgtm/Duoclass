    <script src="/__manus__/debug-collector.js" defer></script>

    <!--
      Import map : redirige les imports dynamiques de onnxruntime-web vers jsDelivr CDN.
      Cela évite de bundler les fichiers WASM/ORT (~25 MB) dans le build Vite.
      Les fichiers WASM sont chargés à la demande lors de l'utilisation du détourage.
    -->
    <script type="importmap">
    {
      "imports": {
        "onnxruntime-web": "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.bundle.min.mjs",
        "onnxruntime-web/webgpu": "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.webgpu.bundle.min.mjs"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="../src/main.tsx"></script>
    <script
      defer
      src="https://manus-analytics.com/umami"
      data-website-id="4608ca25-7365-4fd2-92ee-dab88d94a5eb"></script>
  </body>
