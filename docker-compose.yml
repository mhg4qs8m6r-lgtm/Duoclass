services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: duoclass
      POSTGRES_PASSWORD: duoclass_secret
      POSTGRES_DB: duoclass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duoclass"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://duoclass:duoclass_secret@db:5432/duoclass
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "3000"
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
